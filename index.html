<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Save Our Wildlife</h1>

    <video id="wildlifeVideo" controls aria-label="Wildlife conservation video">
        <source src="wildlife.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <p>
        Wildlife conservation helps protect endangered species and preserves
        biodiversity for future generations. Together we can make a difference.
    </p>

    <button id="toggleBtn">
        Hide / Play Video
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
